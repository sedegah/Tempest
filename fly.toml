app = "tempest"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8000"
  WSGI_MODULE = "tempest.wsgi"

[processes]
  app = "gunicorn tempest.wsgi:application --bind 0.0.0.0:8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[statics]]
  guest_path = "/workspace/staticfiles"
  url_prefix = "/static/"
